<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANOBS - Stream Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4136; /* Merah YouTube/Gaming */
            --secondary: #111111;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Penting untuk OBS agar tidak ada scrollbar */
            background-color: transparent; /* Agar transparan di OBS */
        }

        /* Mode untuk Control Panel (bukan di dalam OBS) */
        body.control-mode {
            background-color: #2a2a2a;
            overflow: auto;
        }

        /* --- LOWER THIRD --- */
        #lower-third {
            position: absolute;
            bottom: 50px;
            left: 50px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
        }

        #lower-third.show {
            opacity: 1;
            transform: translateX(0);
        }

        .lt-box-main {
            background-color: var(--secondary);
            color: white;
            padding: 10px 25px;
            border-radius: 8px 0 0 8px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .lt-box-main h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }

        .lt-box-sub {
            background-color: white;
            color: var(--secondary);
            padding: 10px 20px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        /* --- ALERT BOX --- */
        #alert-box {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(-50px) scale(0.8);
            background: linear-gradient(135deg, var(--primary), #FF851B);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(255, 65, 54, 0.6);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            text-align: center;
            border: 3px solid rgba(255,255,255,0.3);
        }

        #alert-box.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .alert-amount {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            display: block;
            margin-top: 5px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        /* --- CHAT BOX --- */
        #chat-box {
            position: absolute;
            top: 50px;
            right: 20px;
            width: 350px;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 5;
        }

        .chat-message {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.95rem;
            animation: slideInRight 0.3s forwards;
            border-left: 4px solid var(--primary);
            text-shadow: 1px 1px 2px black;
        }

        .chat-author {
            font-weight: 800;
            color: #FFDC00; /* Kuning untuk nama */
            margin-right: 8px;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chat-fade-out {
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- CONTROL PANEL (Tersembunyi di OBS) --- */
        #control-panel {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-w-md;
            z-index: 100;
        }

        body.control-mode #control-panel {
            display: block;
        }

        /* Menyembunyikan overlay saat di control mode agar tidak tumpang tindih */
        body.control-mode #lower-third,
        body.control-mode #alert-box,
        body.control-mode #chat-box {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- OVERLAY ELEMENTS (Akan terlihat di OBS) -->
    
    <!-- 1. Lower Third -->
    <div id="lower-third">
        <div class="lt-box-main">
            <h1 id="lt-name">SANOBS GAMING</h1>
        </div>
        <div class="lt-box-sub">
            <span id="lt-social">@sanobs.id</span>
        </div>
    </div>

    <!-- 2. Alert Box -->
    <div id="alert-box">
        <div id="alert-text">NURUL BARU SAJA SUBSCRIBE!</div>
        <div id="alert-detail" class="alert-amount"></div>
    </div>

    <!-- 3. Chat Box (Dummy/Simulasi) -->
    <div id="chat-box">
        <!-- Pesan akan ditambahkan ke sini oleh JS -->
    </div>


    <!-- CONTROL PANEL (Hanya terlihat jika dibuka di browser biasa) -->
    <div id="control-panel" class="max-w-md w-full">
        <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">SANOBS Control Panel</h2>
        <p class="text-sm text-gray-500 mb-6 text-center">Buka URL ini di OBS sebagai Browser Source untuk overlay. Gunakan tab ini untuk mengontrol.</p>
        
        <!-- Lower Third Controls -->
        <div class="bg-gray-100 p-4 rounded-lg mb-4">
            <h3 class="font-semibold mb-2">Lower Third</h3>
            <input type="text" id="ctrl-name" placeholder="Nama Streamer" class="w-full p-2 mb-2 border rounded" value="SANOBS GAMING">
            <input type="text" id="ctrl-social" placeholder="Info/Sosmed" class="w-full p-2 mb-2 border rounded" value="youtube.com/sanobs">
            <div class="flex gap-2">
                <button onclick="updateLowerThird()" class="bg-blue-500 text-white px-4 py-2 rounded flex-1 hover:bg-blue-600 transition">Update</button>
                <button onclick="toggleLowerThird()" id="btn-toggle-lt" class="bg-green-500 text-white px-4 py-2 rounded flex-1 hover:bg-green-600 transition">Show</button>
            </div>
        </div>

        <!-- Alert Controls -->
        <div class="bg-gray-100 p-4 rounded-lg mb-4">
            <h3 class="font-semibold mb-2">Trigger Alert</h3>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="triggerAlert('sub')" class="bg-purple-500 text-white px-3 py-2 rounded hover:bg-purple-600 transition text-sm">New Subscriber</button>
                <button onclick="triggerAlert('dono')" class="bg-yellow-500 text-white px-3 py-2 rounded hover:bg-yellow-600 transition text-sm">Donation (Saweria)</button>
            </div>
        </div>

        <!-- Chat Controls (Simulasi) -->
        <div class="bg-gray-100 p-4 rounded-lg">
            <h3 class="font-semibold mb-2">Simulate Chat</h3>
            <button onclick="simulateChat()" class="w-full bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-900 transition">Send Random Chat</button>
        </div>
        
        <div class="mt-4 text-center">
             <button onclick="previewOverlay()" class="text-blue-500 underline text-sm">Lihat Preview Overlay (Keluar Panel)</button>
        </div>
    </div>

    <script>
        // --- DETEKSI LINGKUNGAN (OBS vs BROWSER BIASA) ---
        // Cara sederhana: Jika URL memiliki parameter ?control=true, buka control panel
        const urlParams = new URLSearchParams(window.location.search);
        const isControlMode = urlParams.get('control') === 'true';

        // Dalam lingkungan real, biasanya streamer menggunakan LocalStorage atau WebSocket 
        // untuk komunikasi antara tab Control dan tab OBS Browser Source.
        // Di contoh ini, kita gunakan BroadcastChannel API (didukung browser modern) agar
        // tab control bisa mengirim sinyal ke tab OBS.
        const channel = new BroadcastChannel('sanobs_overlay_channel');

        if (isControlMode) {
            document.body.classList.add('control-mode');
        } else {
            // Ini mode Overlay (yang dimasukkan ke OBS)
            // Dengarkan perintah dari channel
            channel.onmessage = (event) => {
                const data = event.data;
                if (data.action === 'toggle_lt') {
                    const lt = document.getElementById('lower-third');
                    if(data.state === 'show') {
                        lt.classList.add('show');
                    } else {
                        lt.classList.remove('show');
                    }
                } else if (data.action === 'update_lt') {
                    document.getElementById('lt-name').innerText = data.name;
                    document.getElementById('lt-social').innerText = data.social;
                } else if (data.action === 'trigger_alert') {
                    showOverlayAlert(data.type);
                } else if (data.action === 'chat') {
                    addChatMessage(data.author, data.text);
                }
            };
        }

        // --- FUNGSI UNTUK CONTROL PANEL ---
        
        let ltVisible = false;

        function updateLowerThird() {
            const name = document.getElementById('ctrl-name').value;
            const social = document.getElementById('ctrl-social').value;
            
            // Jika previewing di tab yang sama
            if(document.body.classList.contains('control-mode') === false) {
                 document.getElementById('lt-name').innerText = name;
                 document.getElementById('lt-social').innerText = social;
            } else {
                // Kirim ke tab OBS
                channel.postMessage({action: 'update_lt', name: name, social: social});
            }
        }

        function toggleLowerThird() {
            ltVisible = !ltVisible;
            const btn = document.getElementById('btn-toggle-lt');
            
            if (ltVisible) {
                btn.innerText = "Hide";
                btn.classList.replace('bg-green-500', 'bg-red-500');
                btn.classList.replace('hover:bg-green-600', 'hover:bg-red-600');
            } else {
                btn.innerText = "Show";
                btn.classList.replace('bg-red-500', 'bg-green-500');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-green-600');
            }

            // Jika previewing di tab yang sama
            if(document.body.classList.contains('control-mode') === false) {
                 const lt = document.getElementById('lower-third');
                 ltVisible ? lt.classList.add('show') : lt.classList.remove('show');
            } else {
                 channel.postMessage({action: 'toggle_lt', state: ltVisible ? 'show' : 'hide'});
            }
        }

        function triggerAlert(type) {
            // Jika previewing di tab yang sama
            if(document.body.classList.contains('control-mode') === false) {
                 showOverlayAlert(type);
            } else {
                 channel.postMessage({action: 'trigger_alert', type: type});
            }
        }

        // --- FUNGSI UNTUK OVERLAY (YANG TAMPIL DI OBS) ---

        let alertTimeout;
        const dummyNames = ["BudiGaming", "Citra_Dewi", "Kang_Baks", "MabarYuk", "IndoPride01"];
        
        function showOverlayAlert(type) {
            const box = document.getElementById('alert-box');
            const textEl = document.getElementById('alert-text');
            const detailEl = document.getElementById('alert-detail');
            
            const randomName = dummyNames[Math.floor(Math.random() * dummyNames.length)];

            // Clear previous timeout if any
            clearTimeout(alertTimeout);
            
            box.classList.remove('show'); // Reset animasi
            
            setTimeout(() => {
                if (type === 'sub') {
                    textEl.innerText = `${randomName} BARU SAJA SUBSCRIBE!`;
                    detailEl.innerText = "Terima Kasih Banyak!";
                    box.style.background = "linear-gradient(135deg, #FF4136, #FF851B)";
                } else if (type === 'dono') {
                    const amount = Math.floor(Math.random() * 100) * 1000 + 10000; // 10k - 100k
                    textEl.innerText = `${randomName} MENDONASI MELALUI SAWERIA!`;
                    detailEl.innerText = `Rp ${amount.toLocaleString('id-ID')}`;
                    box.style.background = "linear-gradient(135deg, #2ECC40, #01FF70)"; // Hijau duit
                }
                
                box.classList.add('show');
                
                // Sembunyikan setelah 5 detik
                alertTimeout = setTimeout(() => {
                    box.classList.remove('show');
                }, 5000);
            }, 100);
        }

        const chatMessages = [
            "Bang main game horor dong wkwk",
            "GG parah bang mainnya",
            "Halo absen dulu dari Bandung",
            "Info mabar ngab",
            "Suaranya kekecilan bang",
            "Mantap dapet item bagus tuh",
            "Wih overlay baru nih? Keren SANOBS!"
        ];

        function addChatMessage(author, text) {
            const chatBox = document.getElementById('chat-box');
            
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            msgEl.innerHTML = `<span class="chat-author">${author}:</span> ${text}`;
            
            chatBox.appendChild(msgEl);
            
            // Batasi jumlah chat maksimal agar memori aman
            if (chatBox.children.length > 8) {
                chatBox.removeChild(chatBox.firstChild);
            }

            // Hapus pesan lama setelah 15 detik (hilang perlahan)
            setTimeout(() => {
                msgEl.classList.add('chat-fade-out');
                setTimeout(() => {
                    if(msgEl.parentNode) msgEl.parentNode.removeChild(msgEl);
                }, 1000); // Tunggu animasi selesai
            }, 15000);
        }

        function simulateChat() {
            const randomName = dummyNames[Math.floor(Math.random() * dummyNames.length)];
            const randomMsg = chatMessages[Math.floor(Math.random() * chatMessages.length)];
            
            if(document.body.classList.contains('control-mode') === false) {
                 addChatMessage(randomName, randomMsg);
            } else {
                 channel.postMessage({action: 'chat', author: randomName, text: randomMsg});
            }
        }

        // FUNGSI DEMO (Hanya untuk keperluan Preview di Editor ini)
        function previewOverlay() {
            // Keluar dari control mode untuk melihat overlay langsung
            document.body.classList.remove('control-mode');
            alert("Memasuki Mode Overlay. Buka ulang dengan parameter ?control=true untuk kembali ke panel.");
            
            // Tampilkan Lower Third sebagai demo
            updateLowerThird();
            setTimeout(() => { document.getElementById('lower-third').classList.add('show'); }, 500);
            
            // Simulasikan chat masuk setiap beberapa detik
            setInterval(() => { simulateChat(); }, 4000);
            
            // Simulasikan alert donasi sesekali
            setTimeout(() => { showOverlayAlert('dono'); }, 3000);
        }

    </script>
</body>
</html>
